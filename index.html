<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SafeRoute</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&family=Playfair+Display:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg: #0f0f0f;
      --bg2: #161616;
      --text: #f0ede8;
      --muted: #888580;
      --accent: #c9a96e;
      --border: rgba(255,255,255,0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* خلفية ناعمة */
    .bg-glow {
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,169,110,0.07), transparent 70%);
      z-index: 0;
    }

    /* النجوم */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      opacity: 0.3;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to { opacity: 0.8; }
    }

    /* المحتوى */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      z-index: 10;
      position: relative;
    }

    /* اللوجو */
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 4.5rem);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo i {
      color: var(--accent);
    }

    /* العنوان */
    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 500;
      margin-bottom: 15px;
    }

    .sub {
      color: var(--muted);
      max-width: 500px;
      margin-bottom: 40px;
      line-height: 1.8;
      font-size: 1rem;
    }

    /* الأزرار */
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 12px 28px;
      border-radius: 4px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .primary {
      background: var(--accent);
      color: #0f0f0f;
    }

    .primary:hover {
      background: #d4b47a;
      transform: translateY(-2px);
    }

    .secondary {
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* موبايل */
    @media (max-width: 768px) {
      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        max-width: 260px;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow"></div>
  <div class="stars" id="stars"></div>

  <section class="hero">
    <h1 class="logo">
      <i class="fas fa-shield-alt"></i>
      SafeRoute
    </h1>

    <p class="tagline">
      أبلغ... ونحن نهتم بالباقي
    </p>

    <p class="sub">
      منصة ذكية لتحليل البلاغات (نص، صوت، صورة) وتوجيهها للجهات المختصة
      مع متابعة حالتها بشكل فوري.
    </p>

    <div class="buttons">
      <a href="#" class="btn primary">
        <i class="fas fa-paper-plane"></i>
        إرسال بلاغ
      </a>

      <a href="malak-atef-portfolio.html" class="btn secondary">
        <i class="fas fa-user"></i>
        Pportfolio
      </a>
    </div>
  </section>

  <script>
    const starsContainer = document.getElementById('stars');

    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.classList.add('star');

      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';

      starsContainer.appendChild(star);
    }
  </script>

</body>
</html>
