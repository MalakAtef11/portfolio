  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600&family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0f0f0f;
      --bg2:     #161616;
      --bg3:     #1e1e1e;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.15);
      --text:    #f0ede8;
      --muted:   #888580;
      --hint:    #4a4744;
      --accent:  #c9a96e;
      --radius:  3px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    body.ar { font-family: 'Cairo', sans-serif; direction: rtl; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 3rem;
      background: rgba(15,15,15,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: var(--text);
    }
    .ar .nav-logo { font-family: 'Amiri', serif; font-size: 22px; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 2rem; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
    }
    .ar .nav-links a { text-transform: none; letter-spacing: 0; font-size: 14px; }
    .nav-links a:hover { color: var(--accent); }
    .lang-btn {
      padding: 6px 18px;
      border: 0.5px solid var(--accent); border-radius: 20px;
      background: transparent; color: var(--accent);
      font-size: 13px; font-family: inherit; font-weight: 500;
      cursor: pointer; transition: background 0.2s, color 0.2s; white-space: nowrap;
    }
    .lang-btn:hover { background: var(--accent); color: #0f0f0f; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: grid; grid-template-columns: 1fr 300px;
      gap: 4rem; align-items: center;
      padding: 8rem 3rem 4rem;
      border-bottom: 0.5px solid var(--border);
      max-width: 1100px; margin: 0 auto;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,169,110,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1.5rem;
    }
    .ar .hero-eyebrow { text-transform: none; letter-spacing: 0; font-size: 13px; }
    .hero-eyebrow::before {
      content: ''; display: block; width: 28px; height: 1px;
      background: var(--accent); flex-shrink: 0;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 62px; font-weight: 700;
      line-height: 1.05; letter-spacing: -1px; margin-bottom: 1.75rem;
    }
    .ar .hero h1 { font-family: 'Amiri', serif; font-size: 54px; letter-spacing: 0; line-height: 1.25; }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .ar .hero h1 em { font-style: normal; }
    .hero-desc { font-size: 16px; color: var(--muted); max-width: 460px; line-height: 1.8; margin-bottom: 2.5rem; }
    .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn-gold {
      padding: 12px 28px; background: var(--accent); color: #0f0f0f;
      border: none; border-radius: var(--radius);
      font-family: inherit; font-size: 13px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      transition: background 0.2s, transform 0.15s; display: inline-block;
    }
    .btn-gold:hover { background: #d4b47a; transform: translateY(-1px); }
    .btn-ghost {
      padding: 12px 28px; background: transparent; color: var(--text);
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      font-family: inherit; font-size: 13px; font-weight: 400;
      text-decoration: none; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; display: inline-block;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* PHOTO */
    .hero-photo-wrap { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .hero-photo {
      width: 250px; height: 310px; border-radius: var(--radius);
      border: 0.5px solid var(--border2); overflow: hidden; background: var(--bg3);
    }
    .hero-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    }
    .photo-placeholder .initials {
      font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; color: var(--hint);
      width: 88px; height: 88px; border-radius: 50%;
      border: 0.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
    }
    .photo-placeholder p { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--hint); text-align: center; padding: 0 1rem; }
    .hero-social { display: flex; gap: 10px; }
    .social-pill {
      padding: 6px 14px; border: 0.5px solid var(--border); border-radius: 20px;
      font-size: 11px; color: var(--muted); text-decoration: none; transition: border-color 0.2s, color 0.2s;
    }
    .social-pill:hover { border-color: var(--accent); color: var(--accent); }

    /* SECTIONS */
    .sec-wrap { max-width: 1100px; margin: 0 auto; }
    section { padding: 5rem 3rem; border-bottom: 0.5px solid var(--border); }
    .sec-head { display: flex; align-items: center; gap: 14px; margin-bottom: 3rem; }
    .sec-num { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
    .ar .sec-num { letter-spacing: 0; font-size: 13px; text-transform: none; }
    .sec-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 500; }
    .ar .sec-title { font-family: 'Amiri', serif; font-size: 34px; }

    /* SKILLS */
    .skills-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
      border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .skill-card { background: var(--bg2); padding: 1.75rem; transition: background 0.2s; }
    .skill-card:hover { background: var(--bg3); }
    .skill-card-icon { font-size: 18px; margin-bottom: 0.75rem; color: var(--accent); }
    .skill-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 0.75rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 11px; padding: 3px 9px;
      background: var(--bg); color: var(--muted);
      border: 0.5px solid var(--border2); border-radius: 2px; letter-spacing: 0.3px;
    }

    /* PROJECTS */
    .projects-grid {
      display: flex; flex-direction: column; gap: 1px;
      background: var(--border); border: 0.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .project-row {
      background: var(--bg2); padding: 2rem;
      display: grid; grid-template-columns: 52px 1fr auto;
      gap: 1.5rem; align-items: start; transition: background 0.15s;
    }
    .ar .project-row { grid-template-columns: auto 1fr 52px; }
    .project-row:hover { background: var(--bg3); }
    .project-num {
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700; color: var(--hint); line-height: 1; padding-top: 4px;
    }
    .project-type { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .ar .project-type { text-transform: none; letter-spacing: 0; font-size: 12px; }
    .project-name { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; margin-bottom: 8px; }
    .ar .project-name { font-family: 'Amiri', serif; font-size: 24px; }
    .project-desc { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 560px; margin-bottom: 12px; }
    .project-arrow { color: var(--hint); font-size: 20px; padding-top: 6px; transition: color 0.2s; }
    .project-row:hover .project-arrow { color: var(--accent); }

    /* HARDWARE */
    .exp-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; background: var(--border);
      border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .exp-card { background: var(--bg2); padding: 2rem; transition: background 0.15s; }
    .exp-card:hover { background: var(--bg3); }
    .exp-card-icon { font-size: 22px; margin-bottom: 1rem; color: var(--accent); }
    .exp-card h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 500; margin-bottom: 0.5rem; }
    .ar .exp-card h3 { font-family: 'Amiri', serif; font-size: 20px; }
    .exp-card p { font-size: 14px; color: var(--muted); line-height: 1.7; }

    /* ABOUT */
    .about-layout { display: grid; grid-template-columns: 1fr 280px; gap: 4rem; align-items: start; }
    .about-text p { font-size: 15px; color: var(--muted); line-height: 1.9; margin-bottom: 1.25rem; }
    .about-stats {
      display: flex; flex-direction: column; gap: 1px;
      background: var(--border); border: 0.5px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .stat-item { background: var(--bg2); padding: 1.5rem; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 4px; }
    .stat-lbl { font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--hint); }
    .ar .stat-lbl { text-transform: none; letter-spacing: 0; font-size: 12px; }

    /* CONTACT */
    .contact-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px; background: var(--border);
      border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .contact-card { background: var(--bg2); padding: 1.75rem; text-decoration: none; display: block; transition: background 0.15s; }
    .contact-card:hover { background: var(--bg3); }
    .contact-card-icon {
      width: 40px; height: 40px; border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 1rem;
    }
    .contact-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--hint); margin-bottom: 4px; }
    .ar .contact-lbl { text-transform: none; letter-spacing: 0; font-size: 12px; }
    .contact-val { font-size: 13px; color: var(--text); word-break: break-all; }

    /* FOOTER */
    footer {
      padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center;
      border-top: 0.5px solid var(--border); max-width: 1100px; margin: 0 auto;
    }
    footer p { font-size: 12px; color: var(--hint); }
    .f-name { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--muted); }
    .ar .f-name { font-family: 'Amiri', serif; font-size: 18px; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .hero-content > * { animation: fadeUp 0.7s ease forwards; opacity: 0; }
    .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
    .hero-content > *:nth-child(2) { animation-delay: 0.2s; }
    .hero-content > *:nth-child(3) { animation-delay: 0.3s; }
    .hero-content > *:nth-child(4) { animation-delay: 0.4s; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; padding: 7rem 1.5rem 3rem; }
      .hero-photo-wrap { display: none; }

      .skills-grid { grid-template-columns: 1fr 1fr; }
      .exp-grid { grid-template-columns: 1fr; }
      .about-layout { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
      footer { padding: 1.5rem; flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>

    footerName:"ملك عاطف"
  }
};

let lang = "en";

function render() {
  const d = content[lang];
  document.documentElement.setAttribute("lang", d.lang);
  document.documentElement.setAttribute("dir", d.dir);
  document.body.classList.toggle("ar", lang === "ar");
  document.title = lang === "ar" ? "ملك عاطف — مهندسة برمجيات" : "Malak Atef — Software Engineer";

  document.querySelector(".nav-logo").innerHTML = d.navLogo;
  document.querySelectorAll(".nav-links a").forEach((a,i) => { a.textContent = d.navLinks[i]||""; });
  document.querySelector(".lang-btn").textContent = d.langBtn;

  document.querySelector(".hero-eyebrow span.eyebrow-text").textContent = d.eyebrow;
  document.querySelector(".hero h1").innerHTML = d.h1;
  document.querySelector(".hero-desc").textContent = d.desc;
  document.querySelector(".btn-li").textContent = d.btnLI;
  document.querySelector(".btn-gh").textContent = d.btnGH;
  document.querySelector(".photo-placeholder p").textContent = d.photoNote;

  document.querySelector(".s1-num").textContent = d.s1.num;
  document.querySelector(".s1-title").textContent = d.s1.title;
  document.querySelectorAll(".skill-card").forEach((c,i) => {
    const s = d.skills[i]; if (!s) return;
    c.querySelector("h3").textContent = s.title;
    c.querySelector(".tags").innerHTML = s.tags.map(t=>`<span class="tag">${t}</span>`).join("");
  });

  document.querySelector(".s2-num").textContent = d.s2.num;
  document.querySelector(".s2-title").textContent = d.s2.title;
  document.querySelectorAll(".project-row").forEach((r,i) => {
    const p = d.projects[i]; if (!p) return;
    r.querySelector(".project-num").textContent = p.num;
    r.querySelector(".project-type").textContent = p.type;
    r.querySelector(".project-name").textContent = p.name;
    r.querySelector(".project-desc").textContent = p.desc;
    r.querySelector(".tags").innerHTML = p.tags.map(t=>`<span class="tag">${t}</span>`).join("");
  });

  document.querySelector(".s3-num").textContent = d.s3.num;
  document.querySelector(".s3-title").textContent = d.s3.title;
  document.querySelectorAll(".exp-card").forEach((c,i) => {
    const h = d.hw[i]; if (!h) return;
    c.querySelector("h3").textContent = h.title;
    c.querySelector("p").textContent = h.desc;
  });

  document.querySelector(".s4-num").textContent = d.s4.num;
  document.querySelector(".s4-title").textContent = d.s4.title;
  document.querySelectorAll(".about-text p").forEach((p,i) => { p.textContent = d.about[i]||""; });
  document.querySelectorAll(".stat-item").forEach((s,i) => {
    const st = d.stats[i]; if (!st) return;
    s.querySelector(".stat-val").textContent = st.val;
    s.querySelector(".stat-lbl").textContent = st.lbl;
  });

  document.querySelector(".s5-num").textContent = d.s5.num;
  document.querySelector(".s5-title").textContent = d.s5.title;

  document.querySelector(".footer-copy").textContent = d.footerCopy;
  document.querySelector(".f-name").textContent = d.footerName;
}

function toggleLang() { lang = lang === "en" ? "ar" : "en"; render(); }
document.addEventListener("DOMContentLoaded", render);
</script>
